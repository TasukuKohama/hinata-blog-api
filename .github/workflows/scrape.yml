name: Auto Scrape Blogs

# いつ実行するか（トリガー）の設定
on:
  schedule:
    # 毎日 日本時間の 朝9時 と 夜21時 に実行（※UTC指定なので9時間引いた時間を書きます）
    - cron: '0 0,12 * * *'
  workflow_dispatch: # GitHubの画面から手動で「今すぐ実行」できるボタンを有効にする

jobs:
  build:
    runs-on: ubuntu-latest # 動かすコンピューターの種類（最新のLinux）
    
    # GitHub Actionがファイル（blogs.json）を書き換えて保存するための権限設定
    permissions:
      contents: write

    steps:
      - name: 1. プロジェクトのコードを取得
        uses: actions/checkout@v4

      - name: 2. Pythonの環境を準備
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 使用するPythonのバージョン

      - name: 3. 必要なライブラリをインストール
        run: pip install -r requirements.txt

      - name: 4. スクレイピングの実行（blogs.jsonが作られる）
        run: python scrape.py

      - name: 5. 変更があればGitHubに保存（コミット＆プッシュ）
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add blogs.json
          # 変更がある場合のみコミットしてプッシュする
          git diff --quiet && git diff --staged --quiet || (git commit -m "ブログのデータを自動更新" && git push)